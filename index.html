<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCERT Class 6 Science Labs - Dr AI Academy</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --header-bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background: #f0fdf4;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Top Bar with Brand Link */
        .top-bar {
            background: #1e293b;
            padding: 10px 20px;
            text-align: right;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .top-bar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.2s;
        }

        .top-bar a:hover {
            color: #34d399;
            text-decoration: underline;
        }

        /* Header Styling */
        header {
            background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Colorful & Playful Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .card h3 {
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        /* Play Button */
        .card a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
        }

        .card a:hover {
            transform: scale(1.05);
        }

        /* Loading Spinner */
        #loader {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #0284c7;
            padding: 50px;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Top Corner Brand Link -->
    <div class="top-bar">
        <a href="https://draiacademy.com" target="_blank">By - Dr AI Academy 🚀</a>
    </div>

    <header>
        <h1>🔬 Class 6 Science Labs 🎮</h1>
        <p>Interactive Games & Virtual Experiments</p>
    </header>

    <div class="container">
        <div id="loader">🔄 Loading Magic Labs...</div>
        <div class="grid" id="labs-grid">
            <!-- Dynamic cards will appear here automatically -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Dr AI Academy. Crafted with ❤️ for Young Scientists.</p>
    </footer>

    <script>
        // GitHub Repository Config (Aapki Repo Information)
        const username = 'DrAIAcademy';
        const repo = 'ncert-class6-science-labs';
        
        // Kids-Friendly Bright Colors Array (Border aur Button ke liye)
        const vibrantColors = [
            { border: '#ff4757', btn: '#ff6b81' }, // Pink Red
            { border: '#2ed573', btn: '#2bcbba' }, // Bright Green
            { border: '#1e90ff', btn: '#70a1ff' }, // Electric Blue
            { border: '#ffa502', btn: '#ff7f50' }, // Orange
            { border: '#9b59b6', btn: '#8e44ad' }, // Purple
            { border: '#00d2d3', btn: '#01a3a4' }, // Cyan
            { border: '#ff6348', btn: '#ff4757' }  // Coral
        ];

        // File ka naam saaf karke achha Title banane ke liye function
        function formatTitle(filename) {
            let name = filename.replace('dr_ai_class6_ch2_', '').replace('.html', '');
            name = name.replace(/_/g, ' ');
            return name.replace(/\b\w/g, c => c.toUpperCase());
        }

        // Chhoti automatic detail/description generate karne ke liye function
        function generateDescription(title) {
            return `Explore the amazing world of science! Play this interactive ${title.toLowerCase()} simulation game designed specifically for NCERT Class 6 students.`;
        }

        // GitHub API se files fetch karne ka logic
        async function fetchLabs() {
            const grid = document.getElementById('labs-grid');
            const loader = document.getElementById('loader');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
                const files = await response.json();
                
                // Sirf HTML files filter karein (lekin khud index.html ko chhodkar)
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                
                loader.style.display = 'none';
                
                if(htmlFiles.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; width:100%;">No lab files found yet!</p>';
                    return;
                }

                htmlFiles.forEach((file, index) => {
                    const title = formatTitle(file.name);
                    const desc = generateDescription(title);
                    
                    // Har card ke liye ek random bright color pair select karein
                    const colorPair = vibrantColors[index % vibrantColors.length];
                    
                    // Card HTML Structure
                    const cardHtml = `
                        <div class="card" style="border-color: ${colorPair.border}; border-top-width: 8px;">
                            <h3 style="color: ${colorPair.border};">${title}</h3>
                            <p>${desc}</p>
                            <a href="${file.name}" style="background: ${colorPair.btn};">Let's Play ➔</a>
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                });

            } catch (error) {
                console.error("Error fetching repository files:", error);
                loader.innerHTML = "❌ Oops! Failed to load labs. Please refresh.";
            }
        }

        // Run functions on page load
        fetchLabs();
    </script>
</body>
</html>
